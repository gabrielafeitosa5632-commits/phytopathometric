<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Scan frame corners -->
  <!-- Top-left -->
  <path d="M40 70 L40 45 L65 45" stroke="#1a5c2a" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Top-right -->
  <path d="M135 45 L160 45 L160 70" stroke="#1a5c2a" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Bottom-left -->
  <path d="M40 130 L40 155 L65 155" stroke="#1a5c2a" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Bottom-right -->
  <path d="M135 155 L160 155 L160 130" stroke="#1a5c2a" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Bar chart (top right of leaf) -->
  <rect x="122" y="82" width="7" height="16" rx="1.5" fill="#4caf72"/>
  <rect x="132" y="74" width="7" height="24" rx="1.5" fill="#2e7d44"/>
  <rect x="142" y="66" width="7" height="32" rx="1.5" fill="#1a5c2a"/>

  <!-- Leaf shape -->
  <!-- Light half (right side) -->
  <path d="M100 50 C120 55 138 75 138 105 C138 128 122 148 100 155 C100 155 100 50 100 50 Z" fill="#6dbe7e"/>
  <!-- Dark half (left side) -->
  <path d="M100 50 C80 55 62 75 62 105 C62 128 78 148 100 155 C100 155 100 50 100 50 Z" fill="#3a9e55"/>
  <!-- Leaf outline -->
  <path d="M100 50 C80 55 62 75 62 105 C62 128 78 148 100 155 C122 148 138 128 138 105 C138 75 120 55 100 50 Z" stroke="#1a5c2a" stroke-width="4.5" stroke-linejoin="round"/>
  <!-- Midrib (stem) -->
  <line x1="100" y1="52" x2="100" y2="155" stroke="#1a5c2a" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Left veins -->
  <line x1="100" y1="90" x2="76" y2="108" stroke="#1a5c2a" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="100" y1="115" x2="78" y2="130" stroke="#1a5c2a" stroke-width="2" stroke-linecap="round"/>
  <!-- Disease spots -->
  <circle cx="82" cy="80" r="5.5" fill="#2e7d44" opacity="0.7"/>
  <circle cx="93" cy="97" r="4.5" fill="#1a5c2a" opacity="0.6"/>
  <circle cx="78" cy="100" r="3.5" fill="#2e7d44" opacity="0.65"/>
  <circle cx="88" cy="115" r="4" fill="#1a5c2a" opacity="0.55"/>
  <circle cx="108" cy="88" r="3" fill="#1a5c2a" opacity="0.5"/>

  <!-- Magnifying glass -->
  <circle cx="128" cy="118" r="11" stroke="#1a5c2a" stroke-width="4.5" fill="white" fill-opacity="0.6"/>
  <line x1="136" y1="126" x2="148" y2="138" stroke="#1a5c2a" stroke-width="4.5" stroke-linecap="round"/>

  <!-- Percent sign below magnifying glass -->
  <text x="130" y="152" font-family="Arial, sans-serif" font-weight="700" font-size="13" fill="#1a5c2a" text-anchor="middle">%</text>
</svg>
